        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Fetch the latest or token-specific plan wizard session
      operationId: getPlanSession
      description: "Возвращает последнюю сессию или конкретный токен мастера планов."
      tags: [plans]
      security:
        - ApiKeyAuth: []
          RequestSignAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/RequestTimestampHeader'
        - $ref: '#/components/parameters/RequestNonceHeader'
        - name: token
          in: query
          required: false
          schema:
            type: string
            description: "Если не указан, возвращается последняя сессия пользователя."
        - name: include_expired
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: plan_id
          in: query
          required: false
          schema:
            type: integer
            description: "Вернуть сессию, связанную с планом (взаимоисключается с token)."
      responses:
        '200':
          description: Session returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanSessionRecord'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: Session expired (unless include_expired=true)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete plan wizard session(s)
      operationId: deletePlanSession
      description: "Удаляет конкретную сессию по токену/плану или все сессии пользователя."
      tags: [plans]
      security:
        - ApiKeyAuth: []
          RequestSignAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/RequestTimestampHeader'
        - $ref: '#/components/parameters/RequestNonceHeader'
        - name: token
          in: query
          required: false
          schema:
            type: string
            description: "Если не указан, удаляются все сессии пользователя."
        - name: plan_id
          in: query
          required: false
          schema:
            type: integer
            description: "Удалить сессии, связанные с планом."
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

