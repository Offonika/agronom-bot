          RequestSignAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/RequestTimestampHeader'
        - $ref: '#/components/parameters/RequestNonceHeader'
        - in: path
          name: payment_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentStatusResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found

  /v1/payments/sbp/webhook:
    post:
      summary: SBP payment webhook
      operationId: handleSbpWebhook
      description: |
        Process SBP payment callback and update payment status.
        Accepts either internal HMAC payload (X-Sign + signature) or native T-Bank Token payload (OrderId/PaymentId/Status/Amount/Token).
        T-Bank callbacks are additionally validated by source IP allowlist (`TINKOFF_IPS`).
      tags: [payments]
      security:
        - HmacAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/PaymentWebhook'
                - $ref: '#/components/schemas/TinkoffWebhookNotification'
      responses:
        '200':
          description: Accepted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/payments/sbp/autopay/webhook:
    post:
      summary: SBP autopay webhook
      operationId: handleAutopayWebhook
      description: |
        Process SBP Autopay callback and update payment status.
        Accepts either internal HMAC payload (X-Sign + signature) or native T-Bank Token payload (OrderId/PaymentId/Status/Amount/Token/RebillId).
        T-Bank callbacks are additionally validated by source IP allowlist (`TINKOFF_IPS`).
      tags: [payments]
      security:
        - HmacAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/AutopayWebhook'
                - $ref: '#/components/schemas/TinkoffWebhookNotification'
      responses:
        '200':
          description: Accepted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/payments/sbp/autopay/cancel:
    post:
      summary: Cancel SBP autopay
      operationId: cancelAutopay
      description: Disable SBP Autopay for the user.
      tags: [payments]
      security:
        - ApiKeyAuth: []
          RequestSignAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/RequestTimestampHeader'
        - $ref: '#/components/parameters/RequestNonceHeader'
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutopayCancelRequest'
      responses:
        '204':
          description: Autopay canceled
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/partner/orders:
    post:
      summary: Order deep-link callback (AgroStore)
      operationId: partnerOrderCallback
      description: Receive deep-link order info from partner AgroStore.
      tags: [partner]
      security:
        - HmacAuth: []
        - ApiKeyAuth: []
          RequestSignAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/RequestTimestampHeader'
        - $ref: '#/components/parameters/RequestNonceHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, user_tg_id, protocol_id, price_kopeks, signature]
              properties:
                order_id:
                  type: string
                user_tg_id:
                  type: integer
                protocol_id:
                  type: integer
                price_kopeks:
                  type: integer
                signature:
                  type: string
                  description: HMAC-SHA256 по телу запроса
      responses:
        '202':
          description: Queued
        '200':
          description: Already processed
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/ask_expert:
    post:
      summary: Queue question for expert
      operationId: askExpert
      description: Send a question to a human agronomist for review.
      tags: [expert]
      security:
        - ApiKeyAuth: []
          RequestSignAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/RequestTimestampHeader'
        - $ref: '#/components/parameters/RequestNonceHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
      responses:
        '202':
          description: Queued
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/beta_stats:
    get:
      summary: Beta houseplants stats snapshot
      operationId: betaStats
      tags: [beta]
      security:
        - HmacAuth: []
      responses:
        '200':
          description: Aggregated beta metrics
          content:
            application/json:
              schema:
                type: object
                required: [stats, generated_at, scope]
                properties:
                  scope:
                    type: string
                    example: beta_stats
                  generated_at:
                    type: string
                    format: date-time
                  stats:
                    type: object
                    properties:
                      beta_testers:
                        type: integer
                      beta_users_with_photo:
                        type: integer
                      beta_users_with_case:
                        type: integer
                      beta_users_survey_completed:
                        type: integer
                      beta_users_followup_answered:
                        type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

