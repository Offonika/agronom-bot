  /v1/ai/diagnose:
    post:
      summary: Diagnose plant disease
      operationId: diagnosePlant
      description: |
        Upload a leaf photo and get back the predicted crop,
        disease and confidence score. Supports multipart uploads
        via `image` (single) or `images[]` (album up to 8 files),
        and JSON body with `image_base64`.
      tags: [diagnose]
      security:
        - ApiKeyAuth: []
          RequestSignAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/RequestTimestampHeader'
        - $ref: '#/components/parameters/RequestNonceHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DiagnoseRequestMultipart'
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnoseRequestBase64'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnoseResponse'
        '202':
          description: Image queued for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnoseQueuedResponse'
        '400':
          description: Bad image / bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Image too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '402':
          description: Free quota exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LimitReached'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-rateLimit:
        ip_limit: 30
        user_limit: 120
        window: minute

